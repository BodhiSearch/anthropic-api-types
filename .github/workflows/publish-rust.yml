name: Publish Rust Crate

on:
  push:
    tags:
      - "release-rust/v*"

concurrency:
  group: publish-rust-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version from tag
        id: version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/release-rust/v}
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Releasing Rust crate v$TAG_VERSION"

      - name: Set crate version
        working-directory: ./rust
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml
          echo "Updated Cargo.toml:"
          head -5 Cargo.toml

      - name: Verify crate builds
        working-directory: ./rust
        run: cargo check

      - name: Package crate
        working-directory: ./rust
        run: cargo package --allow-dirty

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rust/target/package/*.crate
          name: "Rust crate v${{ steps.version.outputs.version }}"
          body: |
            Rust type definitions for the Anthropic API v${{ steps.version.outputs.version }}

            ```toml
            [dependencies]
            anthropic-api = "${{ steps.version.outputs.version }}"
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to crates.io
        working-directory: ./rust
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
